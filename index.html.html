<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1420">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>筋トレ記録ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f1420; --card:#1a2130; --card2:#212a3d; --text:#e8ecf4; --sub:#93a0b5;
    --accent:#4f8ef7; --border:#2b354a;
    --c胸:#f06292; --c背中:#4f8ef7; --c肩:#ffb74d; --c腕:#ba68c8; --c脚:#66bb6a; --c有酸素:#4dd0e1; --cその他:#90a4ae;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;padding:20px;max-width:1100px;margin:0 auto}
  h1{font-size:1.4rem;margin-bottom:4px}
  .sub{color:var(--sub);font-size:.85rem;margin-bottom:16px}
  #drop{border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;color:var(--sub);font-size:.9rem;margin-bottom:20px;cursor:pointer;transition:.2s}
  #drop.over{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.08)}
  #drop input{display:none}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
  .card .label{color:var(--sub);font-size:.75rem;margin-bottom:6px}
  .card .value{font-size:1.5rem;font-weight:700}
  .card .unit{font-size:.8rem;color:var(--sub);font-weight:400;margin-left:2px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
  .panel h2{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .panel h2::before{content:"";width:4px;height:16px;background:var(--accent);border-radius:2px;display:inline-block}
  .chart-wrap{position:relative;height:280px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:760px){.row2{grid-template-columns:1fr}}
  select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.9rem}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:.85rem;cursor:pointer;transition:.15s}
  .chip.on{color:#fff;border-color:transparent}
  .day{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .day-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;user-select:none}
  .day-head:hover{background:var(--card2)}
  .day-head .date{font-weight:700}
  .day-head .meta{color:var(--sub);font-size:.8rem}
  .day-body{display:none;padding:0 16px 14px}
  .day.open .day-body{display:block}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:.7rem;padding:2px 10px;border-radius:10px;color:#fff}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{color:var(--sub);font-weight:500;text-align:left;padding:8px 8px 6px;border-bottom:1px solid var(--border);font-size:.75rem}
  td{padding:7px 8px;border-bottom:1px solid rgba(43,53,74,.5)}
  tr:last-child td{border-bottom:none}
  .ex-name{font-weight:600}
  .sets{color:var(--sub);white-space:normal}
  .vol{text-align:right;font-variant-numeric:tabular-nums}
  .memo{margin-top:10px;background:var(--card2);border-left:3px solid var(--accent);border-radius:6px;padding:8px 12px;font-size:.8rem;color:var(--sub);white-space:pre-wrap}
  .arrow{transition:.2s;color:var(--sub)}
  .day.open .arrow{transform:rotate(90deg)}
  footer{color:var(--sub);font-size:.75rem;text-align:center;margin:24px 0}
  /* スマホ最適化 */
  @media(max-width:640px){
    body{padding:10px}
    h1{font-size:1.1rem}
    .sub{font-size:.75rem;margin-bottom:12px}
    #drop{padding:10px;font-size:.78rem;margin-bottom:14px}
    .cards{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
    .card{padding:10px}
    .card .value{font-size:1.15rem}
    .card .label{font-size:.68rem;margin-bottom:3px}
    .panel{padding:12px;margin-bottom:14px}
    .panel h2{font-size:.92rem}
    .chart-wrap{height:210px}
    .row2{gap:12px}
    .grade-badge{width:50px;height:50px;font-size:1.5rem;border-radius:12px}
    .grade-text{font-size:.8rem}
    h3.mini{margin:12px 0 6px}
    .rx-item{padding:8px 10px;gap:8px;margin-bottom:6px}
    .rx-num{width:22px;height:22px;font-size:.75rem}
    .rx-item .t{font-size:.83rem}
    .rx-item .d{font-size:.74rem}
    .balance{gap:5px}
    .b-chip{min-width:0;flex:1;padding:6px 2px}
    .b-chip .v{font-size:.85rem}
    .b-chip .p{font-size:.68rem}
    .b-chip .s{font-size:.62rem}
    .mini-item{font-size:.78rem;padding:6px 0}
    .mi-d{font-size:.72rem}
    #exSelect{max-width:52%;font-size:.8rem;padding:4px 6px}
    .day-head{padding:10px 12px}
    .day-head .date{font-size:.88rem}
    .day-head .meta{display:block;font-size:.72rem;margin-top:2px}
    .day-head .tags{display:none}
    .day-body{padding:0 10px 12px}
    table{font-size:.74rem}
    th{padding:6px 4px;font-size:.66rem}
    td{padding:6px 4px}
    .tag{font-size:.6rem;padding:1px 6px}
    .chip{padding:4px 11px;font-size:.78rem}
    footer{font-size:.65rem}
  }
  .grade{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .grade-badge{font-size:2rem;font-weight:800;width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
  .grade-text{font-size:.9rem;color:var(--sub)}
  h3.mini{font-size:.8rem;color:var(--sub);margin:14px 0 8px;font-weight:600}
  .rx-item{display:flex;gap:12px;align-items:flex-start;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px}
  .rx-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem}
  .rx-item .t{font-weight:700;font-size:.9rem}
  .rx-item .d{color:var(--sub);font-size:.8rem;margin-top:2px;line-height:1.55}
  .balance{display:flex;flex-wrap:wrap;gap:8px}
  .b-chip{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--card2);border-radius:10px;padding:8px 14px;min-width:78px;border-top:3px solid}
  .b-chip .p{font-size:.75rem;color:var(--sub)}
  .b-chip .v{font-weight:700;font-size:1rem}
  .b-chip .s{font-size:.7rem;font-weight:700}
  .mini-item{display:flex;gap:8px;font-size:.84rem;padding:7px 0;border-bottom:1px solid rgba(43,53,74,.5);line-height:1.5}
  .mini-item:last-child{border-bottom:none}
  .mini-item .ic{flex-shrink:0}
  .mi-d{color:var(--sub);font-size:.78rem;margin-top:1px}
</style>
</head>
<body>
<h1>🏋️ 筋トレ記録ダッシュボード</h1>
<div class="sub" id="period"></div>

<label id="drop">📂 タップしてCSVを選択(PCはドラッグ&ドロップも可)。アプリの「メールで送る」の添付CSVは、長押し→「"ファイル"に保存」してからここで選択
  <input type="file" accept=".csv,text/csv,text/comma-separated-values,application/csv">
</label>

<div class="cards" id="cards"></div>

<div class="panel">
  <h2>💪 トレーナー分析</h2>
  <div class="grade" id="grade"></div>
  <div id="rx"></div>
  <div id="balance"></div>
  <div class="row2" style="gap:20px;margin-top:4px">
    <div id="goods"></div>
    <div id="issues"></div>
  </div>
</div>

<div class="panel">
  <h2>日別トレーニングボリューム(部位別)</h2>
  <div class="chart-wrap"><canvas id="volChart"></canvas></div>
</div>

<div class="row2">
  <div class="panel">
    <h2>部位別ボリューム割合</h2>
    <div class="chart-wrap"><canvas id="partChart"></canvas></div>
  </div>
  <div class="panel">
    <h2 style="justify-content:space-between"><span style="display:flex;align-items:center;gap:8px"><span></span>種目別の推移</span><select id="exSelect"></select></h2>
    <div class="chart-wrap"><canvas id="exChart"></canvas></div>
  </div>
</div>

<div class="panel" style="background:transparent;border:none;padding:0">
  <h2>トレーニング履歴</h2>
  <div class="filters" id="filters"></div>
  <div id="days"></div>
</div>

<footer>CSV形式: 日付,曜日,種目,部位,セット,重量(kg),回数,時間(分),距離(km),ボリューム(kg),メモ</footer>

<script>
const PART_COLORS = {"胸":"#f06292","背中":"#4f8ef7","肩":"#ffb74d","腕":"#ba68c8","脚":"#66bb6a","有酸素":"#4dd0e1"};
const colorOf = p => PART_COLORS[p] || "#90a4ae";
let rows = [], charts = {}, activePart = "すべて";

// --- 引用符・改行対応のCSVパーサ ---
function parseCSV(text){
  const out=[]; let row=[], field="", inQ=false;
  text = text.replace(/^﻿/,"");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){ row.push(field); field=""; }
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&text[i+1]==='\n') i++;
        row.push(field); field="";
        if(row.some(f=>f!=="")) out.push(row);
        row=[];
      }else field+=c;
    }
  }
  row.push(field);
  if(row.some(f=>f!=="")) out.push(row);
  return out;
}

function loadCSV(text){
  const raw = parseCSV(text);
  if(raw.length<2){ alert("データが読み込めませんでした"); return; }
  const header = raw[0];
  const idx = name => header.findIndex(h=>h.includes(name));
  const I = {date:idx("日付"),dow:idx("曜日"),ex:idx("種目"),part:idx("部位"),set:idx("セット"),
             wt:idx("重量"),reps:idx("回数"),min:idx("時間"),km:idx("距離"),vol:idx("ボリューム"),memo:idx("メモ")};
  rows = raw.slice(1).map(r=>({
    date:r[I.date]||"", dow:I.dow>=0?r[I.dow]||"":"", ex:r[I.ex]||"", part:r[I.part]||"その他",
    set:+r[I.set]||0, wt:parseFloat(r[I.wt])||0, reps:parseFloat(r[I.reps])||0,
    min:parseFloat(r[I.min])||0, km:parseFloat(r[I.km])||0,
    vol:parseFloat(r[I.vol])||((parseFloat(r[I.wt])||0)*(parseFloat(r[I.reps])||0)),
    memo:(I.memo>=0?r[I.memo]:"")||""
  })).filter(r=>r.date&&r.ex);
  render();
}

const fmt = n => n.toLocaleString("ja-JP");
const short = d => d.slice(5).replace("-","/");

function render(){
  const dates=[...new Set(rows.map(r=>r.date))].sort();
  const parts=[...new Set(rows.map(r=>r.part))];
  const strength=rows.filter(r=>r.part!=="有酸素");
  const totalVol=strength.reduce((s,r)=>s+r.vol,0);
  const cardioMin=rows.filter(r=>r.part==="有酸素").reduce((s,r)=>s+r.min,0);
  const maxW={}; strength.forEach(r=>{ if(r.wt>(maxW[r.ex]||0)) maxW[r.ex]=r.wt; });

  document.getElementById("period").textContent =
    dates.length?`${dates[0]} 〜 ${dates[dates.length-1]}(${dates.length}日間のトレーニング)`:"";

  document.getElementById("cards").innerHTML = `
    <div class="card"><div class="label">トレーニング日数</div><div class="value">${dates.length}<span class="unit">日</span></div></div>
    <div class="card"><div class="label">総セット数</div><div class="value">${fmt(strength.length)}<span class="unit">set</span></div></div>
    <div class="card"><div class="label">総ボリューム</div><div class="value">${fmt(Math.round(totalVol))}<span class="unit">kg</span></div></div>
    <div class="card"><div class="label">有酸素運動</div><div class="value">${fmt(cardioMin)}<span class="unit">分</span></div></div>
    <div class="card"><div class="label">ベンチプレスMAX</div><div class="value">${maxW["ベンチプレス"]||"-"}<span class="unit">kg</span></div></div>`;

  renderAnalysis(dates);

  // 日別×部位 積み上げ
  const sParts=parts.filter(p=>p!=="有酸素");
  const dsets=sParts.map(p=>({label:p,data:dates.map(d=>Math.round(rows.filter(r=>r.date===d&&r.part===p).reduce((s,r)=>s+r.vol,0))),backgroundColor:colorOf(p),stack:"v",borderRadius:3}));
  makeChart("volChart","bar",{labels:dates.map(short),datasets:dsets},
    {scales:{x:{stacked:true,grid:{display:false},ticks:{color:"#93a0b5"}},y:{stacked:true,grid:{color:"#2b354a"},ticks:{color:"#93a0b5"}}},plugins:{legend:{labels:{color:"#e8ecf4",boxWidth:12}}}});

  // 部位別ドーナツ
  const pVol=sParts.map(p=>Math.round(rows.filter(r=>r.part===p).reduce((s,r)=>s+r.vol,0)));
  makeChart("partChart","doughnut",{labels:sParts,datasets:[{data:pVol,backgroundColor:sParts.map(colorOf),borderColor:"#1a2130",borderWidth:2}]},
    {plugins:{legend:{position:"right",labels:{color:"#e8ecf4",boxWidth:12}}}});

  // 種目セレクト(頻度順)
  const freq={}; strength.forEach(r=>freq[r.ex]=(freq[r.ex]||0)+1);
  const exList=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]);
  const sel=document.getElementById("exSelect");
  const prev=sel.value;
  sel.innerHTML=exList.map(e=>`<option>${e}</option>`).join("");
  if(exList.includes(prev)) sel.value=prev;
  sel.onchange=()=>drawEx(sel.value,dates);
  if(exList.length) drawEx(sel.value,dates);

  // フィルタチップ
  const fdiv=document.getElementById("filters");
  fdiv.innerHTML="";
  ["すべて",...parts].forEach(p=>{
    const b=document.createElement("button"); b.className="chip"+(p===activePart?" on":""); b.textContent=p;
    if(p===activePart) b.style.background=p==="すべて"?"var(--accent)":colorOf(p);
    b.onclick=()=>{activePart=p;render();};
    fdiv.appendChild(b);
  });

  // 日別履歴
  const daysDiv=document.getElementById("days"); daysDiv.innerHTML="";
  [...dates].reverse().forEach((d,di)=>{
    let dayRows=rows.filter(r=>r.date===d);
    if(activePart!=="すべて") dayRows=dayRows.filter(r=>r.part===activePart);
    if(!dayRows.length) return;
    const dParts=[...new Set(dayRows.map(r=>r.part))];
    const dVol=Math.round(dayRows.reduce((s,r)=>s+r.vol,0));
    const memos=[...new Set(dayRows.map(r=>r.memo).filter(Boolean))];
    const exs=[...new Set(dayRows.map(r=>r.ex))];
    const trs=exs.map(e=>{
      const er=dayRows.filter(r=>r.ex===e).sort((a,b)=>a.set-b.set);
      const p=er[0].part;
      const setsTxt=p==="有酸素"
        ? er.map(r=>`${r.min}分${r.km?` / ${r.km}km`:""}`).join(", ")
        : er.map(r=>`${r.wt}kg×${r.reps}`).join(" , ");
      const v=Math.round(er.reduce((s,r)=>s+r.vol,0));
      return `<tr><td class="ex-name"><span class="tag" style="background:${colorOf(p)};margin-right:6px">${p}</span>${e}</td><td class="sets">${setsTxt}</td><td class="vol">${p==="有酸素"?"-":fmt(v)+" kg"}</td></tr>`;
    }).join("");
    const el=document.createElement("div");
    el.className="day"+(di===0?" open":"");
    el.innerHTML=`
      <div class="day-head">
        <div><span class="date">${d}(${dayRows[0].dow})</span> <span class="meta">${exs.length}種目 / ${dayRows.filter(r=>r.part!=="有酸素").length}set / ${fmt(dVol)}kg</span></div>
        <div style="display:flex;align-items:center;gap:10px"><span class="tags">${dParts.map(p=>`<span class="tag" style="background:${colorOf(p)}">${p}</span>`).join("")}</span><span class="arrow">▶</span></div>
      </div>
      <div class="day-body">
        <table><thead><tr><th>種目</th><th>セット内容</th><th style="text-align:right">ボリューム</th></tr></thead><tbody>${trs}</tbody></table>
        ${memos.map(m=>`<div class="memo">📝 ${m}</div>`).join("")}
      </div>`;
    el.querySelector(".day-head").onclick=()=>el.classList.toggle("open");
    daysDiv.appendChild(el);
  });
}

// --- トレーナー分析(ルールベース) ---
function renderAnalysis(dates){
  const gEl=document.getElementById("grade"),rxEl=document.getElementById("rx"),
        balEl=document.getElementById("balance"),goodEl=document.getElementById("goods"),issEl=document.getElementById("issues");
  const st=rows.filter(r=>r.part!=="有酸素");
  const avg=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:0;
  const goods=[],issues=[],rx=[];

  if(dates.length<2){
    gEl.innerHTML="";rxEl.innerHTML="";balEl.innerHTML="";goodEl.innerHTML="";
    issEl.innerHTML="2日分以上の記録が集まると分析を表示します。";
    return;
  }

  const spanDays=(new Date(dates[dates.length-1])-new Date(dates[0]))/864e5+1;
  const weeks=Math.max(spanDays/7,1);
  const freq=dates.length/weeks;
  const gaps=[];for(let i=1;i<dates.length;i++)gaps.push((new Date(dates[i])-new Date(dates[i-1]))/864e5);

  // 頻度・継続
  if(freq>=2.5) goods.push({t:`週${freq.toFixed(1)}回のペースを維持`,d:"筋肥大に十分な頻度。この継続力が最大の資産。"});
  else if(freq>=1.5) issues.push({t:`頻度が週${freq.toFixed(1)}回`,d:"週2.5回以上に増やせると各部位の刺激頻度を確保できる。"});
  else issues.push({t:`頻度が週${freq.toFixed(1)}回と不足`,d:"まず週2回の固定枠の確保から。"});
  if(gaps.length&&Math.max(...gaps)>=8) issues.push({t:`最大${Math.max(...gaps)}日の空白`,d:"1週間空くと挙上重量は落ちる。忙しい週もつなぎの1回を。"});

  // ボリューム傾向
  const dayVol=dates.map(d=>st.filter(r=>r.date===d).reduce((s,r)=>s+r.vol,0));
  if(dates.length>=4){
    const h=Math.floor(dates.length/2),a=avg(dayVol.slice(0,h)),b=avg(dayVol.slice(-h)),pct=a>0?(b-a)/a*100:0;
    if(pct>10) goods.push({t:`セッションボリューム +${Math.round(pct)}%`,d:`平均${Math.round(a).toLocaleString()}kg → ${Math.round(b).toLocaleString()}kg。漸進性過負荷が機能。`});
    else if(pct<-15) issues.push({t:`セッションボリューム -${Math.abs(Math.round(pct))}%`,d:"意図したディロードでなければ原因の確認を。"});
  }

  // 部位別 週セット数
  const PARTS=["胸","背中","肩","腕","脚"];
  const setsWk=p=>st.filter(r=>r.part===p).length/weeks;
  balEl.innerHTML=`<h3 class="mini">部位別・週あたりセット数(発達の目安: 10set以上)</h3><div class="balance">`+
    PARTS.map(p=>{const s=setsWk(p),c=s>=10?"#66bb6a":s>=5?"#ffb74d":"#ef5350",m=s>=10?"◎ 十分":s>=5?"△ やや不足":"✕ 不足";
      return `<div class="b-chip" style="border-color:${c}"><span class="p">${p}</span><span class="v">${s.toFixed(1)}<small style="color:var(--sub);font-weight:400"> set</small></span><span class="s" style="color:${c}">${m}</span></div>`;}).join("")+`</div>`;
  const low=PARTS.filter(p=>setsWk(p)<5), mid=PARTS.filter(p=>setsWk(p)>=5&&setsWk(p)<10);
  if(!low.length&&!mid.length) goods.push({t:"全部位が週10set以上",d:"部位バランスは理想的。"});
  if(low.length) issues.push({t:`${low.join("・")}が週5set未満`,d:"発達がほぼ見込めない水準。ローテーションに固定枠が必要。"});
  if(mid.length) issues.push({t:`${mid.join("・")}が週5〜10set`,d:"維持はできるが、成長させるなら週10set以上へ。"});

  // 詰め込みすぎ
  const over=[];dates.forEach(d=>PARTS.forEach(p=>{const n=st.filter(r=>r.date===d&&r.part===p).length;if(n>=20)over.push(`${d.slice(5).replace("-","/")} ${p}${n}set`);}));
  if(over.length) issues.push({t:`1日への詰め込み: ${over.join(" / ")}`,d:"1部位1回10〜15setが上限の目安。超過分は効果が薄く回復を遅らせるだけ。2回に分けて頻度に回す。"});

  // 進歩・停滞(3回以上実施した種目)
  const exNames=[...new Set(st.map(r=>r.ex))],prog=[],plateau=[];
  exNames.forEach(ex=>{
    const exDates=dates.filter(d=>st.some(r=>r.date===d&&r.ex===ex));
    if(exDates.length<3) return;
    const topAt=d=>Math.max(...st.filter(r=>r.date===d&&r.ex===ex).map(r=>r.wt));
    const first=topAt(exDates[0]),last=topAt(exDates[exDates.length-1]);
    const span=(new Date(exDates[exDates.length-1])-new Date(exDates[0]))/864e5;
    if(last>first) prog.push(`${ex} ${first}→${last}kg`);
    else if(last===first&&span>=14&&exDates.every(d=>topAt(d)<=first)){
      const best=st.filter(r=>r.ex===ex&&r.wt===first).reduce((m,r)=>Math.max(m,r.reps),0);
      plateau.push({ex,wt:first,n:exDates.length,e1:Math.round(first*(1+best/30))});
    }
  });
  if(prog.length) goods.push({t:`${prog.length}種目で重量更新`,d:prog.join(" / ")});
  if(plateau.length) issues.push({t:`停滞中: ${plateau.map(p=>`${p.ex} ${p.wt}kg×${p.n}回連続`).join(" / ")}`,d:"同じ重量×同じ回数の反復は「現状維持の練習」。処方箋の①②で打開を。"});

  // レップ固定
  const repCount={};st.forEach(r=>repCount[r.reps]=(repCount[r.reps]||0)+1);
  const dom=Object.entries(repCount).sort((a,b)=>b[1]-a[1])[0];
  const fixed=dom&&st.length>=20&&dom[1]/st.length>=0.8;
  if(fixed) issues.push({t:`${Math.round(dom[1]/st.length*100)}%のセットが${dom[0]}回で固定`,d:"進歩の物差しが重量だけになっている。回数にも幅を持たせる。"});

  // 有酸素
  const cardioWk=rows.filter(r=>r.part==="有酸素").reduce((s,r)=>s+r.min,0)/weeks;
  if(cardioWk>=20) goods.push({t:`有酸素 週${Math.round(cardioWk)}分`,d:"回復促進・心肺維持に十分。"});

  // 今週の処方箋(優先順)
  if(plateau.length){
    const main=[...plateau].sort((a,b)=>b.wt-a.wt)[0];
    const back=Math.round(main.wt*0.9/2.5)*2.5;
    rx.push({t:`${main.ex}: ${back}kg×5回×5setを2〜3週やり込む`,d:`推定1RMは${main.e1}kg。その後${main.wt}kgに戻り、まず回数+1から更新。以後は2.5kg刻みで微増。`});
    const rest=plateau.filter(p=>p!==main);
    if(rest.length) rx.push({t:`${rest.map(p=>p.ex).join("・")}: ダブルプログレッション`,d:"同重量のまま毎回+1回(8→12回)。12回に達したら重量を一段階上げる。自重系種目は加重へ移行。"});
  }
  if(low.length||mid.length) rx.push({t:`${[...low,...mid].join("・")}を週10setに引き上げ`,d:"「胸+腕 → 背中+肩 → 脚 → 休み」の3分割ローテへ。1部位1回は10〜15setに抑え、余剰分は頻度に回す。"});
  if(fixed) rx.push({t:"トップセットだけ記録更新を狙う",d:"各種目の最重量セットのみ8〜12回で全力。前回の記録を確認してから挑む。残りのセットは10回で揃えてOK。"});
  if(cardioWk<20) rx.push({t:"脚トレ翌日に20分のウォーキング",d:"血流を促して回復を早める。追い込む必要はない。"});
  if(!rx.length) rx.push({t:"現状維持+2.5kgの微増",d:"大きな問題なし。各種目のトップセットを2.5kg刻みで伸ばし続ける。"});
  rxEl.innerHTML=`<h3 class="mini">📋 今週の処方箋(優先順)</h3>`+rx.slice(0,4).map((r,i)=>`<div class="rx-item"><div class="rx-num">${i+1}</div><div><div class="t">${r.t}</div><div class="d">${r.d}</div></div></div>`).join("");

  // 良い点・課題
  goodEl.innerHTML=`<h3 class="mini">✅ できていること</h3>`+(goods.map(g=>`<div class="mini-item"><span class="ic">✅</span><div><strong>${g.t}</strong><div class="mi-d">${g.d}</div></div></div>`).join("")||`<div class="mi-d">まだありません</div>`);
  issEl.innerHTML=`<h3 class="mini">⚠️ 改善ポイント</h3>`+(issues.map(g=>`<div class="mini-item"><span class="ic">⚠️</span><div><strong>${g.t}</strong><div class="mi-d">${g.d}</div></div></div>`).join("")||`<div class="mi-d">特になし。素晴らしい状態。</div>`);

  // 総合評価
  const w=issues.length,gd=goods.length;
  let gr,gc,gt;
  if(w===0&&gd>=4){gr="S";gc="#66bb6a";gt="ほぼ完璧。このまま継続を。";}
  else if(w<=1){gr="A";gc="#66bb6a";gt="良い状態。あと一歩でS。";}
  else if(w<=4){gr="B+";gc="#ffb74d";gt="継続と伸びは合格点。処方箋を上から順に実行を。";}
  else if(w<=6){gr="B";gc="#ffb74d";gt="土台はある。改善ポイントを半分に減らそう。";}
  else{gr="C";gc="#ef5350";gt="まず頻度と部位バランスの立て直しから。";}
  gEl.innerHTML=`<div class="grade-badge" style="background:${gc}">${gr}</div><div class="grade-text">総合評価<br><strong style="color:var(--text)">${gt}</strong></div>`;
}

function drawEx(ex,dates){
  const ds=dates.filter(d=>rows.some(r=>r.date===d&&r.ex===ex));
  const maxWt=ds.map(d=>Math.max(...rows.filter(r=>r.date===d&&r.ex===ex).map(r=>r.wt)));
  const vol=ds.map(d=>Math.round(rows.filter(r=>r.date===d&&r.ex===ex).reduce((s,r)=>s+r.vol,0)));
  makeChart("exChart","line",{labels:ds.map(short),datasets:[
    {label:"最大重量(kg)",data:maxWt,borderColor:"#4f8ef7",backgroundColor:"#4f8ef7",tension:.3,yAxisID:"y"},
    {label:"総ボリューム(kg)",data:vol,borderColor:"#ffb74d",backgroundColor:"#ffb74d",borderDash:[5,4],tension:.3,yAxisID:"y1"}
  ]},{scales:{
    x:{grid:{display:false},ticks:{color:"#93a0b5"}},
    y:{position:"left",grid:{color:"#2b354a"},ticks:{color:"#4f8ef7"}},
    y1:{position:"right",grid:{display:false},ticks:{color:"#ffb74d"}}
  },plugins:{legend:{labels:{color:"#e8ecf4",boxWidth:12}}}});
}

function makeChart(id,type,data,opts){
  if(charts[id]) charts[id].destroy();
  charts[id]=new Chart(document.getElementById(id),{type,data,options:{responsive:true,maintainAspectRatio:false,...opts}});
}

// --- ファイル読み込み ---
const drop=document.getElementById("drop"), input=drop.querySelector("input");
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",ev=>{ const f=ev.dataTransfer.files[0]; if(f) readFile(f); });
input.addEventListener("change",()=>{ if(input.files[0]) readFile(input.files[0]); });
function readFile(f){ const fr=new FileReader(); fr.onload=()=>loadCSV(fr.result); fr.readAsText(f,"UTF-8"); }

// 初期データ
loadCSV(document.getElementById("defaultCsv").textContent.trim());
</script>
